<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Wallet - DCAI L3</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; background: #0b0b0b; color: #f5f5f5; }
    .card { border: 1px solid #2a2a2a; border-radius: 14px; padding: 20px; background: #111; }
    h1, h2 { margin-top: 0; }
    label { display: block; margin-top: 14px; font-weight: 600; }
    input, button { width: 100%; padding: 12px; margin-top: 6px; border-radius: 10px; border: 1px solid #333; background: #161616; color: #fff; }
    button { cursor: pointer; background: #2563eb; border: none; }
    button.secondary { background: #333; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .muted { color: #aaa; font-size: 14px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-all; }
    .box { margin-top: 16px; padding: 14px; border-radius: 10px; background: #0d0d0d; border: 1px solid #222; }
    .success { color: #86efac; }
    .error { color: #fca5a5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Mini Wallet</h1>
    <p class="muted">Simple DCAI L3 wallet demo: connect, refresh balance, and send native token.</p>

    <div class="grid">
      <button id="connectBtn">Connect Wallet</button>
      <button id="switchBtn" class="secondary">Switch to DCAI L3</button>
    </div>

    <div class="box">
      <h2>Wallet Info</h2>
      <div><strong>Address:</strong> <span id="address" class="mono">Not connected</span></div>
      <div style="margin-top:8px;"><strong>Balance:</strong> <span id="balance">-</span> <span>tDCAI</span></div>
      <div style="margin-top:12px;">
        <button id="refreshBtn" class="secondary">Refresh Balance</button>
      </div>
    </div>

    <div class="box">
      <h2>Send Token</h2>
      <label for="to">Recipient address</label>
      <input id="to" placeholder="0x..." />

      <label for="amount">Amount (tDCAI)</label>
      <input id="amount" placeholder="0.01" />

      <button id="sendBtn">Send</button>
    </div>

    <div class="box">
      <h2>Status</h2>
      <div id="status" class="muted">Waiting for action...</div>
    </div>
  </div>

  <script>
    const DCAI_CHAIN = {
      chainId: '0x4809',
      chainName: 'DCAI L3 Testnet',
      nativeCurrency: {
        name: 'tDCAI',
        symbol: 'tDCAI',
        decimals: 18
      },
      rpcUrls: ['http://139.180.188.61:8545'],
      blockExplorerUrls: ['http://139.180.140.143/']
    };

    let selectedAddress = null;

    const addressEl = document.getElementById('address');
    const balanceEl = document.getElementById('balance');
    const statusEl = document.getElementById('status');

    function setStatus(message, type = 'muted') {
      statusEl.className = type;
      statusEl.textContent = message;
    }

    async function ensureWallet() {
      if (!window.ethereum) {
        throw new Error('MetaMask or an EVM wallet is required.');
      }
      return window.ethereum;
    }

    async function connectWallet() {
      const ethereum = await ensureWallet();
      const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
      selectedAddress = accounts[0] || null;
      addressEl.textContent = selectedAddress || 'Not connected';
      setStatus('Wallet connected.', 'success');
      return selectedAddress;
    }

    async function switchToDcai() {
      const ethereum = await ensureWallet();
      try {
        await ethereum.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: DCAI_CHAIN.chainId }]
        });
        setStatus('Switched to DCAI L3.', 'success');
      } catch (err) {
        if (err.code === 4902) {
          await ethereum.request({
            method: 'wallet_addEthereumChain',
            params: [DCAI_CHAIN]
          });
          setStatus('DCAI L3 added to wallet.', 'success');
        } else {
          throw err;
        }
      }
    }

    async function refreshBalance() {
      const ethereum = await ensureWallet();
      if (!selectedAddress) await connectWallet();

      const balanceHex = await ethereum.request({
        method: 'eth_getBalance',
        params: [selectedAddress, 'latest']
      });

      const balance = Number(BigInt(balanceHex)) / 1e18;
      balanceEl.textContent = balance.toFixed(6);
      setStatus('Balance refreshed.', 'success');
    }

    async function sendToken() {
      const ethereum = await ensureWallet();
      if (!selectedAddress) await connectWallet();

      const to = document.getElementById('to').value.trim();
      const amount = document.getElementById('amount').value.trim();

      if (!/^0x[a-fA-F0-9]{40}$/.test(to)) {
        throw new Error('Invalid recipient address.');
      }
      if (!amount || Number(amount) <= 0) {
        throw new Error('Invalid amount.');
      }

      const value = '0x' + BigInt(Math.floor(Number(amount) * 1e18)).toString(16);

      const txHash = await ethereum.request({
        method: 'eth_sendTransaction',
        params: [{
          from: selectedAddress,
          to,
          value
        }]
      });

      setStatus('Transaction sent: ' + txHash, 'success');
      await refreshBalance();
    }

    document.getElementById('connectBtn').addEventListener('click', async () => {
      try {
        await connectWallet();
      } catch (err) {
        setStatus(err.message || 'Connect failed.', 'error');
      }
    });

    document.getElementById('switchBtn').addEventListener('click', async () => {
      try {
        await switchToDcai();
      } catch (err) {
        setStatus(err.message || 'Switch failed.', 'error');
      }
    });

    document.getElementById('refreshBtn').addEventListener('click', async () => {
      try {
        await refreshBalance();
      } catch (err) {
        setStatus(err.message || 'Refresh failed.', 'error');
      }
    });

    document.getElementById('sendBtn').addEventListener('click', async () => {
      try {
        await sendToken();
      } catch (err) {
        setStatus(err.message || 'Send failed.', 'error');
      }
    });

    if (window.ethereum) {
      window.ethereum.on('accountsChanged', (accounts) => {
        selectedAddress = accounts[0] || null;
        addressEl.textContent = selectedAddress || 'Not connected';
      });
    }
  </script>
</body>
</html>
